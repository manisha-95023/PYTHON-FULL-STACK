<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li:nth-child(3) {
            color: red;
        }
        li:first-child {
            color:blue;
        }
        li:last-child {
            color:darkcyan;
        }

    </style>
</head>
<body>
     <ul type="circle">
    <li>one</li>
    <li>two</li>
    <li>three</li>
    <li>four</li>
    <li>five</li></ul>
</body>
</html>
