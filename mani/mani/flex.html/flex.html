<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        body{
            background-color:blueviolet;
        }
        .header{
            background-color: beige;
            height: 200px;
        }
        .nav{
            background-color: pink;
            height: 200px;
        }
        .main{
            background-color: aqua;
            height: 300px;
            display: flex;
        }
        .main>.child1{
            height: 300px;
            width: 70%;
        }
        .main>.child1 .article{
            width: 100%;
            height: 150px;
            background-color: hotpink;
            display: flex;
        }
        .main>.child1 .section{
            background-color: rgb(222, 19, 19);
            height: 150px;
            display: flex;
        }
        .main>.child2{
            background-color: green;
            height: 300px;
            width: 30%;
            justify-content: left;
            align-items: center;
            display: flex;
        }
        .footer{
            background-color: blue;
            height: 200px;
        }
      nav,header,section,article,aside,footer {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      

    </style>
</head>
<body>
    <div class="header">header</div>
    <div class="nav">nav</div>
    <div class="main">
        <div class="child1">
            <div class="article">article</div>
            <div class="section">section</div>
        </div>
        <div class="child2">
            <div class="aside">aside</div>
        </div>
    </div>
    <div class="footer">footer</div>
</body>
</html>
